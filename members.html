<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="https://brand.psu.edu/images/shared-images/PSU-mark-navy.jpg" alt="Penn State Logo" height="40" class="me-2">
            Club Portal
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNav"
            aria-controls="mainNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="members.html" class="nav-link active">Members</a>
                </li>
                <li class="nav-item">
                    <a href="content.html" class="nav-link">Storefront</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container mt-5 flex-grow-1">
    <h2 class="mb-4">Member Registration</h2>

    <form id="memberForm">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="name" class="form-label">Member Name *</label>
                <input type="text" class="form-control" id="name" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="year" class="form-label">Year / Age *</label>
                <input type="number" class="form-control" id="year" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="affiliation" class="form-label">Institution / Organization *</label>
                <input type="text" class="form-control" id="affiliation" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="phone" class="form-label">Phone (Optional)</label>
                <input type="text" class="form-control" id="phone">
            </div>
        </div>

        <button class="btn btn-success" type="submit">Add Member</button>
    </form>

    <hr class="my-4">

    <h3>Member Directory</h3>

    <div class="table-responsive">
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Year</th>
                    <th>Affiliation</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="memberTable"></tbody>
        </table>
    </div>
</main>

<footer class="text-center p-3 bg-light border-top mt-4">
    <p class="mb-0">Student Club Portal © 2026</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
