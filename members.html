<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Member Registration</title>
      <link rel="stylesheet" href="styles.css">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   </head>
   <body>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
         <div class="container">
            <a class="navbar-brand" href="index.html">Club Portal</a>
            <ul class="navbar-nav ms-auto">
               <li class="nav-item">
                  <a class="nav-link" href="index.html">Home</a>
               </li>
               <li class="nav-item">
                  <a class="nav-link active" href="members.html">Members</a>
               </li>
            </ul>
         </div>
      </nav>
      <div class="container mt-5">
         <h2>Member Registration</h2>
         <form id="memberForm">
            <div class="row">
               <div class="col-md-6 mb-3">
                  <label class="form-label">Member Name *</label>
                  <input type="text" id="name" class="form-control" required>
               </div>
               <div class="col-md-6 mb-3">
                  <label class="form-label">Email *</label>
                  <input type="email" id="email" class="form-control" required>
               </div>
               <div class="col-md-6 mb-3">
                  <label class="form-label">Year / Age *</label>
                  <input type="number" id="year" class="form-control" required>
               </div>
               <div class="col-md-6 mb-3">
                  <label class="form-label">Institution / Organization *</label>
                  <input type="text" id="affiliation" class="form-control" required>
               </div>
               <div class="col-md-6 mb-3">
                  <label class="form-label">Phone (Optional)</label>
                  <input type="text" id="phone" class="form-control">
               </div>
            </div>
            <button type="submit" class="btn btn-success">Add Member</button>
         </form>
         <hr>
         <h3>Member Directory</h3>
         <table class="table table-striped mt-3">
            <thead>
               <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Year</th>
                  <th>Affiliation</th>
                  <th>Phone</th>
                  <th>Actions</th>
               </tr>
            </thead>
            <tbody id="memberTable"></tbody>
         </table>
      </div>
      <script src="script.js"></script>
   </body>
</html>
