<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="https://brand.psu.edu/images/shared-images/PSU-mark-navy.jpg" alt="Penn State Logo" height="40" class="me-2">
                Club Portal
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="members.html" class="nav-link">Members</a>
                    </li>
                    <li class="nav-item">
                        <a href="content.html" class="nav-link active">Storefront</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 flex-grow-1">
        <h2 class="mb-4">Shopping Cart Web Page</h2>

        <form id="productForm">
            <div class="row g-3">

                <div class="col-md-4">
                    <label for="productID" class="form-label">Product ID *</label>
                    <input type="text" class="form-control" id="productID" readonly>
                </div>

                <div class="col-md-4">
                    <label for="description" class="form-label">Description *</label>
                    <input type="text" class="form-control" id="description" required>
                </div>

                <div class="col-md-4">
                    <label for="price" class="form-label">Price *</label>
                    <input type="number" step="0.01" min="0.01" class="form-control" id="price" required>
                </div>

                <div class="col-md-4">
                    <label for="category" class="form-label">Category *</label>
                    <select class="form-select" id="category" required>
                        <option value="">Select Category</option>
                        <option>Apparel</option>
                        <option>Event</option>
                        <option>Accessories</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="unit" class="form-label">Unit *</label>
                    <select class="form-select" id="unit" required>
                        <option value="">Select Unit</option>
                        <option>Each</option>
                        <option>Ticket</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="weight" class="form-label">Weight</label>
                    <input type="text" class="form-control" id="weight" placeholder="e.g. 1 lb">
                </div>

                <div class="col-md-4">
                    <label for="color" class="form-label">Color</label>
                    <input type="text" class="form-control" id="color" placeholder="e.g. Navy">
                </div>

            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success" id="addBtn">Add Product</button>
                <button type="reset" class="btn btn-secondary ms-2" id="clearBtn">Clear</button>
            </div>
        </form>

        <hr class="my-5">

        <div class="row mb-4">
            <div class="col-md-6">
                <input type="text" id="search" class="form-control" placeholder="Search products...">
            </div>
        </div>

        <div class="row">

            <div class="col-lg-7 mb-4">
                <h4>Available Products</h4>
                <div id="productList"></div>
            </div>

            <div class="col-lg-5 mb-4">
                <h4>Shopping Cart</h4>
                <div id="cartList"></div>

                <div id="checkoutMessage" class="alert d-none mt-3" role="alert"></div>

                <button id="checkout" class="btn btn-primary mt-3" type="button">
                    Send Cart with AJAX
                </button>
            </div>

        </div>

        <hr class="my-5">

        <h4>JSON Product Data</h4>
        <pre id="jsonOutput" class="bg-light p-3 border rounded"></pre>
    </main>

    <footer class="text-center p-3 bg-light border-top mt-4">
        <p class="mb-0">Student Club Portal © 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="content.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
