<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="https://brand.psu.edu/images/shared-images/PSU-mark-navy.jpg" alt="Penn State Logo" height="40" class="me-2">
                Club Portal
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="content.html" class="nav-link active">Store</a>
                    </li>
                    <li class="nav-item">
                        <a href="/#admin-members" class="nav-link">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
            <div>
                <h2 class="mb-1">Store</h2>
                <p class="text-muted mb-0">Browse available products and send items to your cart.</p>
            </div>

            <button class="btn btn-outline-primary" type="button" id="reloadProducts">
                Reload Products
            </button>
        </div>

        <div id="productMessage" class="alert d-none" role="alert"></div>
        <div id="checkoutMessage" class="alert d-none" role="alert"></div>

        <div class="row mb-4">
            <div class="col-md-6">
                <input type="text" id="search" class="form-control" placeholder="Search products...">
            </div>
        </div>

        <div class="row">

            <div class="col-lg-7 mb-4">
                <h4>Available Products</h4>
                <div id="productList"></div>
            </div>

            <div class="col-lg-5 mb-4">
                <h4>Shopping Cart</h4>
                <div id="cartList"></div>

                <button id="checkout" class="btn btn-primary mt-3" type="button">
                    Go to Checkout
                </button>
            </div>

        </div>

    </main>

    <footer class="text-center p-3 bg-light border-top">
        <p class="mb-0">Student Club Portal &copy; 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="content.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
